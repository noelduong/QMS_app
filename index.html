<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QMS Portal - Polo Manor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 h-screen overflow-hidden flex flex-col font-sans text-slate-800">

  <!-- Top Navigation Bar -->
  <header class="topbar shrink-0 z-30 transition-all duration-400 ease-[cubic-bezier(.4,0,.2,1)]">

    <!-- Row 1: Brand + Toggle + Actions -->
    <div class="topbar-main">
      <div class="flex items-center gap-3">
        <div class="brand-icon">
          <i data-feather="shield" class="w-5 h-5"></i>
        </div>
        <div class="leading-tight">
          <h1 class="text-white font-bold text-[15px] tracking-wide">QMS Portal</h1>
          <p class="text-[10px] text-slate-400 font-medium tracking-[.15em] uppercase">Polo Manor</p>
        </div>
      </div>

      <!-- Center: Navigation Pills -->
      <nav class="topbar-nav" id="topbar-nav">

        <!-- Overall -->
        <a href="#" onclick="loadModule('overall')" class="pill active" id="nav-overall">
          <i data-feather="layout" class="w-4 h-4"></i>
          <span>Overall</span>
        </a>

        <!-- Inspection (dropdown) -->
        <div class="pill-group" id="group-inspection">
          <button onclick="toggleDropdown('inspection')" class="pill" id="nav-inspection">
            <i data-feather="check-square" class="w-4 h-4"></i>
            <span>Inspection</span>
            <i data-feather="chevron-down" class="w-3 h-3 dd-arrow" id="icon-inspection"></i>
          </button>
          <div class="dropdown" id="dd-inspection">
            <a href="#" onclick="loadModule('inspection_final')" class="dropdown-item" id="nav-inspection_final">
              <span class="dd-dot"></span> Final Result
            </a>
            <a href="#" onclick="loadModule('inspection_inline')" class="dropdown-item" id="nav-inspection_inline">
              <span class="dd-dot"></span> Inline Result
            </a>
            <a href="#" onclick="loadModule('inspection_form')" class="dropdown-item" id="nav-inspection_form">
              <span class="dd-dot"></span> Inspection Form
            </a>
          </div>
        </div>

        <!-- Data Analysis (dropdown) -->
        <div class="pill-group" id="group-data-analysis">
          <button onclick="toggleDropdown('data-analysis')" class="pill" id="nav-data-analysis">
            <i data-feather="pie-chart" class="w-4 h-4"></i>
            <span>Data Analysis</span>
            <i data-feather="chevron-down" class="w-3 h-3 dd-arrow" id="icon-data-analysis"></i>
          </button>
          <div class="dropdown" id="dd-data-analysis">
            <a href="#" onclick="loadModule('return')" class="dropdown-item" id="nav-return">
              <span class="dd-dot"></span> Return
            </a>
            <a href="#" onclick="loadModule('feedback')" class="dropdown-item" id="nav-feedback">
              <span class="dd-dot"></span> Feedback Rate
            </a>
          </div>
        </div>

        <!-- Plan -->
        <a href="#" onclick="loadModule('plan')" class="pill" id="nav-plan">
          <i data-feather="calendar" class="w-4 h-4"></i>
          <span>Plan</span>
        </a>
      </nav>

      <!-- Right actions -->
      <div class="flex items-center gap-2">
        <button onclick="toggleTopbar()" class="topbar-toggle-btn" id="topbar-toggle" title="Ẩn/hiện menu">
          <i data-feather="chevron-up" class="w-4 h-4 transition-transform duration-300" id="toggle-icon"></i>
        </button>
        <button class="action-btn"><i data-feather="bell" class="w-[18px] h-[18px]"></i></button>
        <button class="action-btn"><i data-feather="settings" class="w-[18px] h-[18px]"></i></button>
        <div class="user-avatar" title="Admin User">AD</div>
      </div>
    </div>
  </header>

  <!-- Page Title Bar -->
  <div class="title-bar shrink-0 z-10">
    <div class="flex items-center gap-3">
      <!-- Mobile menu button -->
      <button id="mobile-menu-btn" class="md:hidden text-slate-500 hover:text-slate-800">
        <i data-feather="menu" class="w-5 h-5"></i>
      </button>
      <h2 id="page-title" class="text-lg font-bold text-slate-800 tracking-tight">Overall Dashboard</h2>
    </div>
  </div>

  <!-- Main Content Area -->
  <main class="flex-1 relative w-full h-full overflow-hidden bg-slate-50 min-w-0">
    <!-- Loading overlay -->
    <div id="loader" class="absolute inset-0 bg-white/80 backdrop-blur-sm z-10 flex flex-col items-center justify-center transition-opacity duration-300 opacity-0 pointer-events-none">
      <div class="w-10 h-10 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
      <p class="mt-4 text-sm font-medium text-slate-500">Đang tải phân hệ...</p>
    </div>
    
    <iframe id="main-frame" src="placeholders/overall.html" class="w-full h-full border-none" allowfullscreen></iframe>
  </main>

  <script src="app.js"></script>
  <script>
    feather.replace();
  </script>

</body>
</html>
