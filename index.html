<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QMS - POLOMANOR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Premium Dark Navy Sidebar Overrides */
    aside {
      --text-inactive: #94a3b8 !important; /* slate-400 */
      --text-active: #ffffff !important; /* white */
      --sidebar-active-bg: rgba(255, 255, 255, 0.12) !important; /* semi-transparent white */
    }
    aside .sidebar-item {
      color: var(--text-inactive) !important;
    }
    aside .sidebar-item:hover {
      background-color: rgba(255, 255, 255, 0.06) !important;
      color: #f8fafc !important;
    }
    aside .sidebar-item.active {
      color: var(--text-active) !important;
      background-color: var(--sidebar-active-bg) !important;
    }
    aside .sidebar-item.active i {
      color: var(--text-active) !important;
    }
    /* section titles in sidebar */
    aside span.text-slate-400 {
      color: #64748b !important; /* silver gray */
      opacity: 0.8;
    }
    /* bottom actions text */
    aside .sidebar-item.text-slate-400 {
      color: #94a3b8 !important;
    }
    /* dark theme toggle card */
    aside div.bg-slate-50 {
      background-color: rgba(255, 255, 255, 0.04) !important;
      border-color: rgba(255, 255, 255, 0.05) !important;
    }
    aside div.bg-slate-50 span {
      color: #94a3b8 !important;
    }
    /* border dividers */
    aside div.border-slate-100, aside div.border-t {
      border-color: rgba(255, 255, 255, 0.08) !important;
    }
    aside .sidebar-item.text-rose-500:hover {
      background-color: rgba(239, 68, 68, 0.1) !important;
      color: #f87171 !important;
    }
  </style>
</head>

<body class="bg-[#f4f5f8] h-screen overflow-hidden flex font-sans text-slate-800">

  <!-- Left Sidebar Navigation -->
  <aside
    class="w-[260px] h-screen border-r border-white/5 flex flex-col justify-between p-6 shrink-0 z-30 transition-all duration-300"
    style="background: linear-gradient(180deg, #1e3a8a 0%, #0f172a 100%) !important;">
    <div class="space-y-6">

      <!-- Logo Brand -->
      <div class="flex flex-col items-center gap-2.5 text-center px-2">
        <div class="w-14 h-14 flex items-center justify-center">
          <img src="assets/logo.png" alt="Logo" class="w-full h-full object-contain">
        </div>
        <div class="leading-tight">
          <h1 class="text-slate-100 font-extrabold text-[13px] tracking-wider uppercase">QUALITY MANAGEMENT</h1>
        </div>
      </div>


      <!-- Navigation Menu -->
      <nav class="space-y-4">
        <!-- Section: Overview -->
        <div>
          <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest block mb-1.5 px-3">OVERVIEW</span>
          <a href="#" onclick="loadModule('overall')" class="sidebar-item active" id="nav-overall">
            <i data-feather="layout" class="w-4 h-4"></i>
            <span>Overall Dashboard</span>
          </a>
        </div>

        <!-- Section: Inspection -->
        <div>
          <span
            class="text-[9px] font-bold text-slate-400 uppercase tracking-widest block mb-1.5 px-3">INSPECTION</span>
          <div class="space-y-0.5">
            <a href="#" onclick="loadModule('inspection_final')" class="sidebar-item" id="nav-inspection_final">
              <i data-feather="file-text" class="w-4 h-4"></i>
              <span>Final Result</span>
            </a>
            <a href="#" onclick="loadModule('inspection_inline')" class="sidebar-item" id="nav-inspection_inline">
              <i data-feather="activity" class="w-4 h-4"></i>
              <span>Inline Result</span>
            </a>
            <a href="#" onclick="loadModule('inspection_form')" class="sidebar-item" id="nav-inspection_form">
              <i data-feather="check-square" class="w-4 h-4"></i>
              <span>Inspection Form</span>
            </a>
          </div>
        </div>

        <!-- Section: Data Analysis -->
        <div>
          <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest block mb-1.5 px-3">DATA
            ANALYSIS</span>
          <div class="space-y-0.5">
            <a href="#" onclick="loadModule('return')" class="sidebar-item" id="nav-return">
              <i data-feather="repeat" class="w-4 h-4"></i>
              <span>Return Analysis</span>
            </a>
            <a href="#" onclick="loadModule('feedback')" class="sidebar-item" id="nav-feedback">
              <i data-feather="pie-chart" class="w-4 h-4"></i>
              <span>Feedback Rate</span>
            </a>
            <a href="#" onclick="loadModule('materials_approval')" class="sidebar-item" id="nav-materials_approval">
              <i data-feather="scissors" class="w-4 h-4"></i>
              <span>Fabric Testing</span>
            </a>
          </div>
        </div>

        <!-- Section: Planning -->
        <div>
          <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest block mb-1.5 px-3">PLANNING</span>
          <a href="#" onclick="loadModule('plan')" class="sidebar-item" id="nav-plan">
            <i data-feather="calendar" class="w-4 h-4"></i>
            <span>Work Plan</span>
          </a>
        </div>
      </nav>
    </div>

    <!-- Bottom Actions -->
    <div class="space-y-3 pt-3 border-t border-slate-100">
      <div class="space-y-0.5">
        <a href="#" class="sidebar-item text-slate-400">
          <i data-feather="help-circle" class="w-4 h-4"></i>
          <span>Support</span>
        </a>
        <a href="#" class="sidebar-item text-slate-400">
          <i data-feather="settings" class="w-4 h-4"></i>
          <span>Settings</span>
        </a>
      </div>

      <!-- Theme Switcher -->
      <div class="flex items-center justify-between px-3 py-1.5 bg-slate-50 rounded-xl border border-slate-100/60">
        <span class="text-[9px] font-extrabold text-slate-500 uppercase tracking-wider">Dark Theme</span>
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" class="sr-only peer" id="dark-theme-toggle">
          <div
            class="w-8 h-4.5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-3.5 after:w-3.5 after:transition-all peer-checked:bg-slate-900">
          </div>
        </label>
      </div>

      <a href="#" class="sidebar-item text-rose-500 hover:bg-rose-50 hover:text-rose-600">
        <i data-feather="log-out" class="w-4 h-4"></i>
        <span>Sign out</span>
      </a>
    </div>
  </aside>

  <!-- Right Main Area -->
  <div class="flex-1 flex flex-col h-screen overflow-hidden min-w-0 p-5 pl-0">

    <!-- Top Header of Workspace Canvas -->
    <header class="flex items-center justify-between mb-4 px-4 h-12 shrink-0">
      <div class="flex items-center gap-3">
        <h2 id="page-title" class="text-lg font-black text-slate-800 tracking-tight">OVERALL DASHBOARD</h2>
        <span
          class="px-2 py-0.5 bg-slate-100 rounded-md text-[9px] font-bold text-slate-500 uppercase tracking-wider">Live</span>
      </div>

      <!-- Search, Notifications, Actions -->
      <div class="flex items-center gap-3">
        <div class="relative w-44">
          <input type="text" placeholder="Search report..."
            class="w-full bg-white border border-slate-100/80 rounded-full py-1.5 pl-8 pr-3 text-[10px] text-slate-500 font-bold focus:outline-none focus:border-slate-300 shadow-sm placeholder-slate-300 transition-all duration-200">
          <i data-feather="search" class="w-3.5 h-3.5 text-slate-300 absolute left-3 top-2.5"></i>
        </div>
        <button
          class="w-8 h-8 rounded-full bg-white border border-slate-100/80 flex items-center justify-center text-slate-400 hover:text-slate-600 hover:border-slate-200 shadow-sm transition-all duration-200">
          <i data-feather="bell" class="w-4 h-4"></i>
        </button>
        <button
          class="w-8 h-8 rounded-full bg-white border border-slate-100/80 flex items-center justify-center text-slate-400 hover:text-slate-600 hover:border-slate-200 shadow-sm transition-all duration-200">
          <i data-feather="message-circle" class="w-4 h-4"></i>
        </button>
        <button
          class="w-8 h-8 rounded-full bg-white border border-slate-100/80 flex items-center justify-center text-slate-400 hover:text-slate-600 hover:border-slate-200 shadow-sm transition-all duration-200">
          <i data-feather="settings" class="w-4 h-4"></i>
        </button>
      </div>
    </header>

    <!-- Nested White Dynamic Workspace Canvas -->
    <main
      class="flex-1 bg-white rounded-[32px] shadow-[0_10px_35px_rgba(0,0,0,0.02)] border border-slate-100/60 overflow-hidden relative flex flex-col">
      <!-- Loading overlay -->
      <div id="loader"
        class="absolute inset-0 bg-white/80 backdrop-blur-sm z-20 flex flex-col items-center justify-center transition-opacity duration-300 opacity-0 pointer-events-none">
        <div class="w-10 h-10 border-[3.5px] border-slate-100 border-t-slate-900 rounded-full animate-spin"></div>
        <p class="mt-4 text-xs font-bold text-slate-500 uppercase tracking-widest">Loading component...</p>
      </div>

      <iframe id="main-frame" src="placeholders/overall.html?v=2.1.0" class="w-full h-full border-none"
        allowfullscreen></iframe>
    </main>
  </div>

  <script src="app.js?v=2.1.0"></script>
  <script>
    feather.replace();
  </script>

</body>

</html>
