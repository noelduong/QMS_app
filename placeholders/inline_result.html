<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inline Result Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <!-- QMS API Client -->
  <script src="../api.js"></script>
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      background: transparent; 
      -webkit-font-smoothing: antialiased;
    }
    
    .glass-panel {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
    }

    .glass-header {
      background: rgba(245, 245, 247, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-6xl mx-auto">
    <!-- Header Area -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
      <div>
        <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Inline Inspection Results</h2>
        <p class="text-sm text-slate-500 mt-1 font-medium tracking-wide">Lịch sử đánh giá chất lượng trong quá trình sản xuất</p>
      </div>
    </div>

    <!-- Filters Panel -->
    <div class="glass-panel rounded-2xl p-4 md:p-6 mb-6">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        <!-- Nhà máy filter -->
        <div>
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Nhà máy / Nhà gia công</label>
          <div class="relative">
            <select id="filter-factory" onchange="applyFilters()" class="w-full bg-white/60 border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-700 outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all appearance-none cursor-pointer">
              <option value="">Tất cả nhà máy</option>
            </select>
            <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-slate-400">
              <i data-feather="chevron-down" class="w-4 h-4"></i>
            </div>
          </div>
        </div>

        <!-- Filter theo Thời gian (Tháng, Tuần, Ngày) -->
        <div>
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Khoảng thời gian</label>
          <div class="relative">
            <select id="filter-time-preset" onchange="onTimePresetChange()" class="w-full bg-white/60 border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-700 outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all appearance-none cursor-pointer">
              <option value="all">Tất cả thời gian</option>
              <option value="today">Hôm nay</option>
              <option value="yesterday">Hôm qua</option>
              <option value="this-week">Tuần này</option>
              <option value="last-week">Tuần trước</option>
              <option value="this-month">Tháng này</option>
              <option value="last-month">Tháng trước</option>
              <option value="custom">Tùy chọn ngày...</option>
            </select>
            <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-slate-400">
              <i data-feather="chevron-down" class="w-4 h-4"></i>
            </div>
          </div>
        </div>

        <!-- Ngày bắt đầu (Cho Custom) -->
        <div id="custom-date-start-container" class="hidden">
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Từ ngày</label>
          <input type="date" id="filter-date-start" onchange="applyFilters()" class="w-full bg-white/60 border border-slate-200 rounded-xl px-4 py-2 text-sm text-slate-700 outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all cursor-pointer">
        </div>

        <!-- Ngày kết thúc (Cho Custom) -->
        <div id="custom-date-end-container" class="hidden">
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Đến ngày</label>
          <input type="date" id="filter-date-end" onchange="applyFilters()" class="w-full bg-white/60 border border-slate-200 rounded-xl px-4 py-2 text-sm text-slate-700 outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all cursor-pointer">
        </div>
      </div>
    </div>

    <!-- Main Data Table -->
    <div class="glass-panel rounded-2xl overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left text-sm whitespace-nowrap">
          <thead class="glass-header text-slate-500 font-medium border-b border-black/5">
            <tr>
              <th class="px-5 py-4 w-32 tracking-wide uppercase text-[11px]">Ngày kiểm</th>
              <th class="px-5 py-4 tracking-wide uppercase text-[11px]">Mã báo cáo</th>
              <th class="px-5 py-4 tracking-wide uppercase text-[11px]">Nhà gia công</th>
              <th class="px-5 py-4 tracking-wide uppercase text-[11px]">Sản phẩm</th>
              <th class="px-5 py-4 tracking-wide uppercase text-[11px]">PO Qty</th>
              <th class="px-5 py-4 tracking-wide uppercase text-[11px]">Kết quả</th>
              <th class="px-5 py-4 text-right tracking-wide uppercase text-[11px]">Thao tác</th>
            </tr>
          </thead>
          <tbody id="table-body" class="divide-y divide-black/5">
            <!-- Loading State -->
            <tr id="loading">
              <td colspan="7" class="p-12 text-center text-slate-500">
                <div class="flex flex-col items-center justify-center">
                  <i data-feather="loader" class="w-6 h-6 animate-spin mb-3 text-blue-500"></i>
                  <p class="font-medium">Đang tải dữ liệu kiểm tra Inline...</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let allInlineGens = [];
    let allSummaryMap = {};

    async function loadData() {
      try {
        if (!QMS_API.isConfigured()) {
          throw new Error('API chưa được cấu hình. Vui lòng cấu hình API_URL trong api.js');
        }

        const res = await QMS_API.getFinalResults();
        const genData = res.general || [];
        const sumData = res.summary || [];

        // Lọc các báo cáo có status là Inline
        allInlineGens = genData.filter(r => r.status && r.status.trim().toLowerCase() === 'inline');

        // Tạo Map summary theo general_id
        allSummaryMap = {};
        sumData.forEach(row => {
          if (row.general_id) allSummaryMap[row.general_id] = row;
        });

        // Sắp xếp báo cáo mới nhất lên đầu
        allInlineGens.sort((a, b) => new Date(b.submit_time || b.timestamp) - new Date(a.submit_time || a.timestamp));

        // Nạp danh sách nhà máy vào bộ lọc
        populateFactoryFilter();

        // Render bảng dữ liệu
        renderTable(allInlineGens);

      } catch (e) {
        console.error(e);
        document.getElementById('loading').innerHTML = `
          <td colspan="7" class="p-12 text-center text-rose-500">
            <div class="flex flex-col items-center justify-center">
              <i data-feather="alert-triangle" class="w-6 h-6 mb-3"></i>
              <p class="font-medium">Lỗi khi tải dữ liệu từ Google Sheets.</p>
              <p class="text-xs mt-1 text-rose-400">${e.message}</p>
            </div>
          </td>
        `;
        feather.replace();
      }
    }

    function populateFactoryFilter() {
      const select = document.getElementById('filter-factory');
      if (!select) return;

      // Tìm danh sách nhà máy độc nhất
      const factories = new Set();
      allInlineGens.forEach(row => {
        if (row.fob_supplier && row.fob_supplier.trim()) {
          factories.add(row.fob_supplier.trim());
        }
      });

      // Reset select
      select.innerHTML = '<option value="">Tất cả nhà máy</option>';

      // Sắp xếp và thêm vào select
      [...factories].sort().forEach(f => {
        const opt = document.createElement('option');
        opt.value = f;
        opt.textContent = f;
        select.appendChild(opt);
      });
    }

    function renderTable(dataList) {
      const tableBody = document.getElementById('table-body');
      if (!tableBody) return;

      let html = '';

      dataList.forEach(row => {
        const sum = allSummaryMap[row.general_id] || {};
        
        // Logic Kết quả (Verdict)
        let verdictHTML = '<span class="px-2.5 py-1 rounded text-[11px] font-bold tracking-wider bg-slate-100 text-slate-500 uppercase">PENDING</span>';
        
        if (sum.final_pass === '1' || sum.final_pass === 'TRUE' || sum.final_pass === true) {
          verdictHTML = '<span class="px-2.5 py-1 rounded text-[11px] font-bold tracking-wider bg-emerald-50 text-emerald-700 border border-emerald-100 uppercase">PASS</span>';
        } else if (sum.final_fail === '1' || sum.final_fail === 'TRUE' || sum.final_fail === true) {
          verdictHTML = '<span class="px-2.5 py-1 rounded text-[11px] font-bold tracking-wider bg-rose-50 text-rose-700 border border-rose-100 uppercase">FAIL</span>';
        }

        const dateStr = row.inspection_date ? row.inspection_date.split(' ')[0] : 'N/A';

        html += `
          <tr class="hover:bg-white/60 transition-colors group cursor-pointer">
            <td class="px-5 py-4 text-sm font-medium text-slate-500">${dateStr}</td>
            <td class="px-5 py-4 text-sm font-semibold text-slate-800">${row.general_id}</td>
            <td class="px-5 py-4 text-sm text-slate-600">${row.fob_supplier || ''}</td>
            <td class="px-5 py-4 text-sm text-slate-800 font-medium">${row.product_name || ''}</td>
            <td class="px-5 py-4 text-sm text-slate-600">${row.po_qty || 0}</td>
            <td class="px-5 py-4">${verdictHTML}</td>
            <td class="px-5 py-4 text-right">
              <button onclick="viewReportDetail('${row.general_id}', this)" class="text-blue-500 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100">
                Xem chi tiết
              </button>
            </td>
          </tr>
        `;
      });

      if (dataList.length === 0) {
        html = '<tr><td colspan="7" class="p-12 text-center text-slate-500 font-medium">Không tìm thấy báo cáo kiểm tra Inline nào phù hợp với bộ lọc.</td></tr>';
      }

      tableBody.innerHTML = html;
      feather.replace();
    }

    function onTimePresetChange() {
      const preset = document.getElementById('filter-time-preset').value;
      const startCont = document.getElementById('custom-date-start-container');
      const endCont = document.getElementById('custom-date-end-container');

      if (preset === 'custom') {
        startCont.classList.remove('hidden');
        endCont.classList.remove('hidden');
      } else {
        startCont.classList.add('hidden');
        endCont.classList.add('hidden');
        applyFilters();
      }
    }

    function getPresetDateRange(preset) {
      const now = new Date();
      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      
      switch (preset) {
        case 'today':
          return { start: todayStart, end: new Date(todayStart.getTime() + 86400000 - 1) };
          
        case 'yesterday': {
          const start = new Date(todayStart.getTime() - 86400000);
          return { start, end: new Date(start.getTime() + 86400000 - 1) };
        }
        
        case 'this-week': {
          const day = todayStart.getDay();
          const diff = todayStart.getDate() - day + (day === 0 ? -6 : 1);
          const start = new Date(todayStart.setDate(diff));
          const end = new Date(start.getTime() + 7 * 86400000 - 1);
          return { start, end };
        }
        
        case 'last-week': {
          const day = todayStart.getDay();
          const diff = todayStart.getDate() - day + (day === 0 ? -6 : 1) - 7;
          const start = new Date(todayStart.setDate(diff));
          const end = new Date(start.getTime() + 7 * 86400000 - 1);
          return { start, end };
        }
        
        case 'this-month': {
          const start = new Date(now.getFullYear(), now.getMonth(), 1);
          const end = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59, 999);
          return { start, end };
        }
        
        case 'last-month': {
          const start = new Date(now.getFullYear(), now.getMonth() - 1, 1);
          const end = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59, 999);
          return { start, end };
        }
        
        default:
          return { start: null, end: null };
      }
    }

    function applyFilters() {
      const factory = document.getElementById('filter-factory').value;
      const preset = document.getElementById('filter-time-preset').value;

      let startDate = null;
      let endDate = null;

      if (preset === 'custom') {
        const startVal = document.getElementById('filter-date-start').value;
        const endVal = document.getElementById('filter-date-end').value;
        if (startVal) startDate = new Date(startVal + 'T00:00:00');
        if (endVal) endDate = new Date(endVal + 'T23:59:59');
      } else if (preset !== 'all') {
        const range = getPresetDateRange(preset);
        startDate = range.start;
        endDate = range.end;
      }

      const filtered = allInlineGens.filter(row => {
        // Lọc theo Nhà máy
        if (factory && row.fob_supplier && row.fob_supplier.trim() !== factory) {
          return false;
        }

        // Lọc theo Ngày tháng
        if (startDate || endDate) {
          const insDateStr = row.inspection_date ? row.inspection_date.split(' ')[0] : '';
          if (!insDateStr) return false;
          
          const insDate = new Date(insDateStr + 'T12:00:00'); // Dùng 12:00:00 tránh lệch múi giờ local
          
          if (startDate && insDate < startDate) return false;
          if (endDate && insDate > endDate) return false;
        }

        return true;
      });

      renderTable(filtered);
    }

    // Tự động tải dữ liệu khi trang sẵn sàng
    document.addEventListener('DOMContentLoaded', loadData);

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function viewReportDetail(generalId, btn) {
      if (!btn) return;
      const originalText = btn.textContent;
      
      // Mở cửa sổ mới ngay lập tức trong luồng tương tác của người dùng để tránh bị Popup Blocker chặn
      const win = window.open("", "_blank");
      if (!win) {
        alert("Trình duyệt đã chặn cửa sổ bật lên (popup). Vui lòng cho phép popup để xem báo cáo!");
        return;
      }
      
      // Hiển thị màn hình tải dữ liệu với spinner tuyệt đẹp
      win.document.open();
      win.document.write(`
        <html>
        <head>
          <title>Đang tải báo cáo...</title>
          <style>
            body {
              font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
              display: flex;
              flex-direction: column;
              align-items: center;
              justify-content: center;
              height: 100vh;
              margin: 0;
              background: #f8fafc;
              color: #475569;
            }
            .spinner {
              border: 4px solid #e2e8f0;
              border-top: 4px solid #0f172a;
              border-radius: 50%;
              width: 40px;
              height: 40px;
              animation: spin 1s linear infinite;
              margin-bottom: 20px;
            }
            @keyframes spin {
              0% { transform: rotate(0deg); }
              100% { transform: rotate(360deg); }
            }
            .title {
              font-size: 18px;
              font-weight: 600;
              margin-bottom: 8px;
              color: #0f172a;
            }
          </style>
        </head>
        <body>
          <div class="spinner"></div>
          <div class="title">Đang tải chi tiết báo cáo ${escapeHtml(generalId)}</div>
          <div>Vui lòng đợi trong giây lát...</div>
        </body>
        </html>
      `);
      win.document.close();

      btn.disabled = true;
      btn.textContent = "Đang tải...";

      function getDirectDriveUrl(url) {
        if (!url) return "";
        if (url.indexOf("drive.google.com") === -1) return url;
        let m = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
        if (m && m[1]) return "https://lh3.googleusercontent.com/d/" + m[1];
        m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
        if (m && m[1]) return "https://lh3.googleusercontent.com/d/" + m[1];
        return url;
      }

      try {
        const report = await QMS_API.getInspectionReport(generalId);
        if (!report || report.ok === false) {
          throw new Error(report.err || "Không thể tải báo cáo từ máy chủ");
        }

        const general = {
          fob: report.general.fob_supplier,
          product: report.general.product_name,
          product_code: report.general.product_code,
          category: report.general.category,
          color: report.general.color,
          ins_date: report.general.inspection_date,
          inspection_location: report.general.inspection_location,
          status: report.general.status,
          po_qty: report.general.po_qty,
          sample_size: report.general.sample_size,
          size_range: report.general.size_range,
          po_month: report.general.po_month,
          inspector: report.general.inspector
        };

        const measRows = report.measurements || [];
        const pointsSet = new Set();
        const sizesSet = new Set();
        let sampleCount = 1;

        measRows.forEach(row => {
          if (row.point_name) pointsSet.add(row.point_name);
          if (row.size) sizesSet.add(row.size);
          const sNo = parseInt(row.sample_no) || 1;
          if (sNo > sampleCount) sampleCount = sNo;
        });

        const points = [...pointsSet];
        const sizes = [...sizesSet];

        const mRows = {};
        measRows.forEach(row => {
          const pt = row.point_name;
          const sz = row.size;
          const idx = (parseInt(row.sample_no) || 1) - 1;
          
          if (!mRows[pt]) mRows[pt] = {};
          if (!mRows[pt][sz]) {
            mRows[pt][sz] = {
              spec: row.spec_value || "",
              tol: row.tol || "",
              samples: Array.from({ length: sampleCount }, () => ({ value: "", result: "" }))
            };
          }
          
          if (mRows[pt][sz].samples[idx]) {
            mRows[pt][sz].samples[idx] = {
              value: row.measured_value || "",
              result: row.result || ""
            };
          }
        });

        const measurementDataPdf = {
          points,
          sizes,
          sampleCount,
          rows: mRows
        };

        const detailRows = (report.defects || []).map(r => ({
          section: r.section || "",
          point: r.point || r.section || "",
          description: r.description || "",
          quantity: r.quantity || 0,
          critical: r.critical || 0,
          major: r.major || 0,
          minor: r.minor || 0,
          corrective: r.corrective_action || "",
          image: r.image || ""
        }));

        const s = report.summary || {};
        const mImpacts = [];
        if (s.meas_impact_yes === "1" || s.meas_impact_yes === "TRUE" || s.meas_impact_yes === true) mImpacts.push("YES");
        if (s.meas_impact_no === "1" || s.meas_impact_no === "TRUE" || s.meas_impact_no === true) mImpacts.push("NO");
        if (s.meas_impact_reinspect === "1" || s.meas_impact_reinspect === "TRUE" || s.meas_impact_reinspect === true) mImpacts.push("RE-INSPECT");
        const mImpactStr = mImpacts.join(", ") + (s.meas_impact_time ? ` | Deadline: ${s.meas_impact_time}` : "");

        const aImpacts = [];
        if (s.app_impact_yes === "1" || s.app_impact_yes === "TRUE" || s.app_impact_yes === true) aImpacts.push("YES");
        if (s.app_impact_no === "1" || s.app_impact_no === "TRUE" || s.app_impact_no === true) aImpacts.push("NO");
        if (s.app_impact_reinspect === "1" || s.app_impact_reinspect === "TRUE" || s.app_impact_reinspect === true) aImpacts.push("RE-INSPECT");
        const aImpactStr = aImpacts.join(", ") + (s.app_impact_time ? ` | Deadline: ${s.app_impact_time}` : "");

        const measPass = s.meas_pass === "1" || s.meas_pass === "TRUE" || s.meas_pass === true;
        const appPass = s.app_pass === "1" || s.app_pass === "TRUE" || s.app_pass === true;
        const finalPass = s.final_pass === "1" || s.final_pass === "TRUE" || s.final_pass === true;

        const summary = {
          meas_qty: s.meas_fail_count || 0,
          meas_rate: s.meas_fail_rate ? (parseFloat(s.meas_fail_rate) * 100).toFixed(2) + "%" : "0.00%",
          meas_cause: s.meas_cause || "",
          meas_impact: mImpactStr,
          meas_result: measPass ? "PASS" : "FAIL",

          app_qty: s.app_total_qty || 0,
          app_rate: s.app_defect_rate ? (parseFloat(s.app_defect_rate) * 100).toFixed(2) + "%" : "0.00%",
          app_cause: s.app_cause || "",
          app_impact: aImpactStr,
          app_result: appPass ? "PASS" : "FAIL",

          final_qty: `Critical ${s.app_critical_qty || 0} / Major ${s.app_major_qty || 0} / Minor ${s.app_minor_qty || 0}`,
          final_rate: finalPass ? "PASS" : "FAIL",
          final_cause: !measPass ? "Measurement fail rate > 30%" : (parseInt(s.app_critical_qty) > 0 ? "Critical defect > 0" : (!appPass ? "AQL Major/Minor result" : "")),
          final_note: `PO Qty ${s.po_qty || 0} | Sample Size ${s.sample_size || 0} | Major Accept ${s.major_accept || 0} | Minor Accept ${s.minor_accept || 0}`,
          final_result: finalPass ? "PASS" : "FAIL",

          remark: s.remark || "",
          ack_factory: s.ack_factory || "",
          ack_polomanor: s.ack_polomanor || "",
          ack_date: s.ack_date || ""
        };

        const measurementHtml = (() => {
          if (!measurementDataPdf || !measurementDataPdf.points || !measurementDataPdf.points.length || !measurementDataPdf.sizes || !measurementDataPdf.sizes.length) {
            return `<div style="font-size:11px;color:#666;padding:8px 0">No measurement data</div>`;
          }

          const headerSizes = measurementDataPdf.sizes.map(size => {
            let h = `<th class="m-size">${escapeHtml(size)}</th>`;
            for (let i = 1; i <= measurementDataPdf.sampleCount; i++) {
              h += `<th class="m-sample">${i}</th>`;
            }
            return h;
          }).join("");

          const bodyRows = measurementDataPdf.points.map((point, index) => {
